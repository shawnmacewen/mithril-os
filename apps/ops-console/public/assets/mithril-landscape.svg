<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 920" role="img" aria-label="Minimal landscape with lake, mountains, raccoon, cat, and birds">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9d8ff"/>
      <stop offset="100%" stop-color="#eef3ff"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="920" fill="url(#sky)"/>

  <!-- distant mountains -->
  <path d="M0 470 L180 330 L330 455 L470 305 L660 470 Z" fill="#5f7a9d" fill-opacity="0.35"/>
  <path d="M420 470 L620 320 L800 470 Z" fill="#5f7a9d" fill-opacity="0.3"/>
  <path d="M700 470 L930 300 L1130 470 Z" fill="#5f7a9d" fill-opacity="0.35"/>
  <path d="M960 470 L1110 360 L1280 470 Z" fill="#5f7a9d" fill-opacity="0.28"/>

  <!-- lake -->
  <rect x="0" y="470" width="1280" height="450" fill="#4f6e8b" fill-opacity="0.25"/>
  <path d="M0 560 C160 530, 300 585, 460 560 C620 535, 760 585, 920 560 C1080 535, 1180 575, 1280 560 L1280 920 L0 920 Z" fill="#4f6e8b" fill-opacity="0.22"/>

  <!-- foreground shore -->
  <path d="M0 650 C200 620, 350 690, 540 655 C760 615, 930 695, 1280 650 L1280 920 L0 920 Z" fill="#2f3e53" fill-opacity="0.55"/>

  <!-- cat silhouette -->
  <g transform="translate(980 645)" fill="#2f3e53" fill-opacity="0.85">
    <ellipse cx="0" cy="18" rx="24" ry="14"/>
    <circle cx="-14" cy="3" r="9"/>
    <path d="M-21 -2 l4 -9 l5 7 z"/>
    <path d="M-9 -2 l4 -9 l5 7 z"/>
    <path d="M22 10 q14 4 9 16" stroke="#2f3e53" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- raccoon silhouette -->
  <g transform="translate(1060 665)" fill="#2f3e53" fill-opacity="0.88">
    <ellipse cx="0" cy="14" rx="22" ry="13"/>
    <circle cx="-11" cy="1" r="8"/>
    <path d="M-17 -3 l3 -8 l5 6 z"/>
    <path d="M-8 -3 l3 -8 l5 6 z"/>
    <ellipse cx="-13" cy="2" rx="6" ry="3" fill="#6f879e" fill-opacity="0.65"/>
    <path d="M20 9 q18 5 10 20" stroke="#2f3e53" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M25 16 q7 0 10 4" stroke="#6f879e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M23 21 q7 0 10 4" stroke="#6f879e" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- birds -->
  <g stroke="#2f3e53" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7">
    <path d="M220 210 q14 -14 28 0"/>
    <path d="M248 210 q14 -14 28 0"/>
    <path d="M310 170 q12 -12 24 0"/>
    <path d="M334 170 q12 -12 24 0"/>
    <path d="M940 200 q10 -10 20 0"/>
    <path d="M960 200 q10 -10 20 0"/>
  </g>
</svg>
